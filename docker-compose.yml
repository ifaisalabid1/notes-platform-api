services:
  postgres:
    image: postgres:18-alpine
    container_name: notes_platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
      POSTGRES_DB: notes_platform
    ports:
      - "5432:5432"
    volumes:
      - notes_platform_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notes_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  notes_platform_pgdata:
